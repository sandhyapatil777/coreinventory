<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - CoreInventory</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

.logo{
font-size:22px;
font-weight:600;
color:#38bdf8;
margin-bottom:35px;
}

body{
display:flex;
height:100vh;
background:#0f172a;
color:white;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
padding:25px;
display:flex;
flex-direction:column;
}

.logo{
font-size:22px;
font-weight:600;
color:#38bdf8;
margin-bottom:35px;
}

.sidebar a{
color:#cbd5f5;
text-decoration:none;
padding:12px;
border-radius:8px;
margin:4px 0;
transition:0.3s;
}

.sidebar a:hover{
background:#1e293b;
color:#38bdf8;
}

/* MAIN */

.main{
flex:1;
padding:30px;
overflow-y:auto;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.search{
padding:10px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
width:280px;
}

/* BUTTONS */

.btn{
padding:10px 20px;
border-radius:8px;
border:none;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

.btn-warehouses{
background:#38bdf8;
color:white;
}

.btn-locations{
background:#22c55e;
color:white;
}

.btn:hover{
opacity:0.9;
}
 

/* WAREHOUSE GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

/* CARD */

.card{
background:linear-gradient(145deg,#1e293b,#0f172a);
padding:20px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.02);
box-shadow:0 10px 25px rgba(56,189,248,0.3);
}

.hidden{
display:none;
}

#map{
height:500px;
width:100%;
border-radius:12px;
margin-top:20px;
}

/* RESPONSIVE */

@media(max-width:900px){

.sidebar{
display:none;
}

.grid{
grid-template-columns:repeat(1,1fr);
}


}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">CoreInventory</div>

<a href="dashboard.html">Dashboard</a>
<a href="products.html">Products</a>
<a href="receipts.html">Receipts</a>
<a href="deliveries.html">Delivery Orders</a>
<a href="transfers.html">Internal Transfers</a>
<a href="adjustments.html">Inventory Adjustment</a>
<a href="movements.html">Move History</a>
<a href="warehouses.html">Warehouses</a>
<a href="settings.html">Settings</a>
<a href="profile.html">Profile</a>
<a href="logout.html">Logout</a>
</div>


<!-- MAIN -->

<div class="main">

<div class="topbar">
<h1>Settings</h1>
</div>

<!-- BUTTONS -->

<div>
<button class="btn btn-warehouses" onclick="showWarehouses()">Warehouses</button>
<button class="btn btn-locations" onclick="showLocations()">Warehouse Locations</button>
</div>


<!-- CONTENT -->

<div id="content">

<div id="warehouses" class="hidden grid"></div>

<div id="locations" class="hidden">
<div id="map"></div>
</div>

</div>

</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const warehouses = [

{ name: "Pune Warehouse", code: "WH001", address: "Pune, Maharashtra", lat: 18.5204, lng: 73.8567 },
{ name: "Nashik Warehouse", code: "WH002", address: "Nashik, Maharashtra", lat: 19.9975, lng: 73.7898 },
{ name: "Satara Warehouse", code: "WH003", address: "Satara, Maharashtra", lat: 17.6800, lng: 73.9900 },
{ name: "Latur Warehouse", code: "WH004", address: "Latur, Maharashtra", lat: 18.4088, lng: 76.5698 }

];

const warehousesContainer = document.getElementById('warehouses');
const locationsContainer = document.getElementById('locations');

let map;

function showWarehouses(){

locationsContainer.classList.add('hidden');
warehousesContainer.classList.remove('hidden');

warehousesContainer.innerHTML = '';

warehouses.forEach(wh => {

const card = document.createElement('div');

card.className = 'card';

card.innerHTML = `
<h2>${wh.name}</h2>
<p><b>Code:</b> ${wh.code}</p>
<p><b>Address:</b> ${wh.address}</p>
`;

warehousesContainer.appendChild(card);

});

}

function showLocations(){

warehousesContainer.classList.add('hidden');
locationsContainer.classList.remove('hidden');

if(!map){

map = L.map('map').setView([18.5204, 74],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
attribution:'© OpenStreetMap'
}).addTo(map);

warehouses.forEach(wh => {

L.marker([wh.lat,wh.lng])
.addTo(map)
.bindPopup(`<b>${wh.name}</b><br>${wh.address}`);

});

}

}

</script>

</body>
</html>
